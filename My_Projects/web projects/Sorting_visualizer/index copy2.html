<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="all">
      <!-- heading -->
      <h1>--- Sorting Visualizer ---</h1>

      <!-- menu  -->
      <div id="options">
        <div><span>Size : </span><span id="showSize">20</span><input type="range" id="size" min="10" max="100" step="1" value="20"></div>

        <div id="speed">Speed : <button id="low"> < </button><span id="speed-level"></span><button id="high"> > </button></div>

        <div>
          Algorithm :
          <select name="" id="menu-bars">
            <option value="bubble" selected>Bubble Sort</option>
            <option value="select">Selection Sort</option>
          </select>

        </div>
        <!-- <div>Sound :  <input id="sound" type="checkbox"> </div> -->
      </div>

      <!-- bars -->
      <div class="container"></div>

      <!-- buttons -->
      <div id="buttons">
        <button class="btn" id="sort">Sort</button>
        <button class="btn" id="pause">Pause</button>
        <button class="btn" id="newarr" onclick="restart()">New Array</button>
      </div>
    </div>
    <!-- <audio src="sounds/pop.mp3" id="shift"></audio> -->
    <script src="scripts/style.js"></script>
    <script src="scripts/main.js"></script>
    <!-- <script src="scripts/app.js"></script> -->
    <script src="scripts/bubbleSort.js"></script>
    <script src="scripts/selectionSort.js"></script>
  </body>
</html>
